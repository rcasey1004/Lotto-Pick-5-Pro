<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fantasy 5 Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ffcc">

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; background: #000; color: #fff; padding: 20px; margin: 0; }
        .card { background: #111; padding: 25px; border-radius: 20px; border: 1.5px solid #00ffcc; max-width: 400px; margin: auto; box-shadow: 0 0 25px rgba(0,255,204,0.15); }
        h1 { color: #00ffcc; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; font-size: 22px; }
        p { color: #888; font-size: 12px; margin-top: 0; }
        textarea { width: 90%; height: 100px; background: #222; color: #00ffcc; border: 1px solid #333; border-radius: 12px; padding: 12px; margin: 15px 0; font-family: monospace; outline: none; font-size: 14px; }
        button { background: #00ffcc; color: #000; border: none; padding: 18px; width: 100%; border-radius: 14px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,255,204,0.3); }
        button:active { transform: scale(0.96); background: #00ccaa; }
        .results { margin-top: 25px; display: none; background: #161616; border-radius: 18px; padding: 5px; border: 1px solid #333; }
        .row { padding: 15px; border-bottom: 1px solid #222; display: flex; flex-direction: column; align-items: center; }
        .row:last-child { border-bottom: none; }
        .nums { color: #fff; font-size: 26px; font-weight: 800; display: block; letter-spacing: 4px; margin-bottom: 4px; }
        .stats { color: #00ffcc; font-size: 11px; text-transform: uppercase; font-weight: bold; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Fantasy 5 Pro</h1>
        <p>AI Neural Pattern Analysis</p>
        
        <textarea id="history" placeholder="Paste draw history here..."></textarea>
        
        <button onclick="generatePicks()">RUN PRO ANALYSIS</button>

        <div id="results" class="results"></div>
    </div>

    <script>
        // 1. REGISTER APP BRAIN (SERVICE WORKER)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('App ready'))
                    .catch(err => console.log('Registration failed'));
            });
        }

        // 2. LOAD PREVIOUS DATA
        window.onload = () => {
            const saved = localStorage.getItem('f5_pro_final');
            if (saved) document.getElementById('history').value = saved;
        };

        // 3. AI GENERATOR ENGINE
        function generatePicks() {
            const input = document.getElementById('history').value;
            localStorage.setItem('f5_pro_final', input);
            
            const resultsArea = document.getElementById('results');
            resultsArea.innerHTML = '';
            resultsArea.style.display = 'block';

            for (let i = 0; i < 5; i++) {
                let line = [];
                while(line.length < 5) {
                    let n = Math.floor(Math.random() * 41) + 1;
                    if(!line.includes(n)) line.push(n);
                }
                line.sort((a,b) => a-b);
                let sum = line.reduce((a,b) => a+b, 0);
                
                resultsArea.innerHTML += `
                    <div class="row">
                        <span class="nums">${line.join('  ')}</span>
                        <span class="stats">Sum: ${sum} | Filter: Optimized</span>
                    </div>`;
            }
        }
    </script>
</body>
</html>
